<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Verse Card — ELYMAS DIGITAL HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:ital,wght@1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:#0A0018;
  min-height:100vh;
  padding:1.5rem 1rem 3rem;
  color:#FAE080;
}

/* ── TOP BAR ── */
.topbar{
  text-align:center;
  margin-bottom:1.8rem;
}
.site-name{
  font-family:'Cinzel',serif;
  font-size:1.1rem;font-weight:700;
  background:linear-gradient(90deg,#C9A227,#E8C040,#FAE080);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;margin-bottom:.3rem;
}
.page-title{
  font-size:.8rem;color:rgba(255,255,255,.4);
  letter-spacing:.15em;text-transform:uppercase;
}

/* ── CONTROLS ── */
.controls{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(201,162,39,.3);
  border-radius:12px;padding:1.3rem;
  margin-bottom:1.5rem;
  max-width:500px;margin-left:auto;margin-right:auto;
}
.ctrl{margin-bottom:1rem}
.ctrl:last-child{margin-bottom:0}
.lbl{
  display:block;font-size:.68rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  color:#C9A227;margin-bottom:.5rem;
}
select{
  width:100%;padding:.7rem 1rem;
  background:rgba(255,255,255,.08);
  border:1.5px solid rgba(201,162,39,.3);
  border-radius:6px;color:#FAE080;
  font-family:'Nunito',sans-serif;font-size:.88rem;
  outline:none;appearance:none;cursor:pointer;
}
select option{background:#14003A;color:#FAE080}

/* language checkboxes */
.lang-row{display:flex;flex-wrap:wrap;gap:.5rem}
.lchk{
  display:flex;align-items:center;gap:.35rem;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(201,162,39,.2);
  border-radius:20px;padding:.4rem .85rem;
  cursor:pointer;font-size:.75rem;font-weight:700;
  color:rgba(255,255,255,.65);
  transition:all .2s;user-select:none;
}
.lchk.on{
  background:rgba(201,162,39,.2);
  border-color:#C9A227;color:#E8C040;
}
.lchk input{display:none}

.gen-btn{
  width:100%;max-width:500px;display:block;
  margin:0 auto 1.5rem;
  padding:1rem;
  background:linear-gradient(135deg,#8B6914,#C9A227,#E8C040);
  color:#14003A;border:none;border-radius:8px;
  font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  box-shadow:0 6px 24px rgba(201,162,39,.45);
  transition:transform .2s,box-shadow .2s;
}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,162,39,.6)}
.gen-btn:active{transform:scale(.98)}

/* ── THE CARD (this is what gets shared) ── */
#card-wrap{
  max-width:500px;margin:0 auto 1.5rem;
  display:none;
}
#card-wrap.show{display:block}

.verse-card{
  width:100%;
  background:linear-gradient(160deg,#14003A 0%,#2A0060 40%,#4B0082 70%,#14003A 100%);
  border-radius:16px;
  padding:2rem 1.6rem 1.6rem;
  position:relative;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  border:1px solid rgba(201,162,39,.25);
}

/* glowing orbs inside card */
.verse-card::before{
  content:'';position:absolute;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(75,0,130,.7),transparent 70%);
  top:-80px;left:-80px;pointer-events:none;
}
.verse-card::after{
  content:'';position:absolute;
  width:250px;height:250px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,162,39,.18),transparent 70%);
  bottom:-60px;right:-60px;pointer-events:none;
}

.card-inner{position:relative;z-index:2}

/* top gold line */
.card-top-line{
  height:3px;width:100%;
  background:linear-gradient(90deg,transparent,#C9A227,#E8C040,transparent);
  border-radius:2px;margin-bottom:1.4rem;
}

/* site name on card */
.card-site{
  font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;
  background:linear-gradient(90deg,#C9A227,#E8C040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:.5rem;
}

/* cross */
.card-cross{
  text-align:center;font-size:1.4rem;
  color:rgba(255,255,255,.3);margin-bottom:.8rem;
  font-family:'Cinzel',serif;
}

/* label */
.card-label{
  font-size:.64rem;letter-spacing:.3em;text-transform:uppercase;
  color:#E8C040;font-weight:700;text-align:center;
  margin-bottom:1.1rem;
}

/* verse divider */
.card-divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,162,39,.5),transparent);
  margin-bottom:1.1rem;
}

/* english verse */
.card-verse{
  font-family:'EB Garamond',serif;font-style:italic;
  font-size:1.15rem;line-height:1.85;
  color:rgba(255,255,255,.93);
  text-align:center;margin-bottom:.9rem;
}

/* reference */
.card-ref{
  font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;
  background:linear-gradient(90deg,#C9A227,#E8C040,#FAE080);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:1.4rem;letter-spacing:.05em;
}

/* translations section */
.card-trans-title{
  font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;
  color:rgba(201,162,39,.7);font-weight:700;
  text-align:center;margin-bottom:.9rem;
}

.card-lang-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:.7rem;margin-bottom:1.2rem;
}
.card-lang-grid.one-col{grid-template-columns:1fr}

.card-lang{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(201,162,39,.22);
  border-radius:8px;padding:.75rem;
}
.card-lang-name{
  font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;
  color:#E8C040;font-weight:700;margin-bottom:.4rem;
}
.card-lang-text{
  font-size:.82rem;line-height:1.65;
  color:rgba(255,255,255,.82);font-family:'EB Garamond',serif;
}
.card-lang-text.rtl{direction:rtl;text-align:right;font-size:.9rem}
.card-lang-text.it{font-style:italic}

/* bottom */
.card-bottom-line{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,162,39,.4),transparent);
  margin:1rem 0 .8rem;
}
.card-footer{
  text-align:center;
  font-size:.62rem;color:rgba(255,255,255,.3);
  letter-spacing:.1em;
}

/* ── SAVE BUTTON ── */
.save-btn{
  width:100%;max-width:500px;display:none;
  margin:0 auto .8rem;
  padding:1rem;
  background:linear-gradient(135deg,#4B0082,#7B2FBE);
  color:#fff;border:none;border-radius:8px;
  font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  box-shadow:0 6px 24px rgba(75,0,130,.5);
  transition:transform .2s;
}
.save-btn.show{display:block}
.save-btn:hover{transform:translateY(-2px)}

/* ── TIP ── */
.tip{
  max-width:500px;margin:0 auto;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(201,162,39,.2);
  border-radius:10px;padding:1.1rem;
  font-size:.82rem;color:rgba(255,255,255,.55);
  line-height:1.7;text-align:center;
  display:none;
}
.tip.show{display:block}
.tip strong{color:#E8C040}
</style>
</head>
<body>

<div class="topbar">
  <span class="site-name">✦ ELYMAS DIGITAL HUB</span>
  <span class="page-title">Daily Verse Card Generator</span>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="ctrl">
    <label class="lbl">Choose Verse</label>
    <select id="verseSelect">
      <option value="auto">📅 Today's Auto Verse</option>
      <option value="0">Jeremiah 29:11</option>
      <option value="1">Philippians 4:13</option>
      <option value="2">Psalm 23:1</option>
      <option value="3">Proverbs 3:5</option>
      <option value="4">Joshua 1:9</option>
      <option value="5">John 3:16</option>
      <option value="6">Psalm 27:1</option>
    </select>
  </div>

  <div class="ctrl">
    <label class="lbl">Languages to show on card</label>
    <div class="lang-row">
      <label class="lchk on" id="lb-heb"><input type="checkbox" id="ck-heb" checked/>🔤 Hebrew</label>
      <label class="lchk on" id="lb-grk"><input type="checkbox" id="ck-grk" checked/>🔤 Greek</label>
      <label class="lchk on" id="lb-ara"><input type="checkbox" id="ck-ara" checked/>🔤 Aramaic</label>
      <label class="lchk on" id="lb-lat"><input type="checkbox" id="ck-lat" checked/>✝ Latin</label>
    </div>
  </div>
</div>

<button class="gen-btn" onclick="generateCard()">✦ Generate Verse Card</button>

<!-- THE CARD -->
<div id="card-wrap">
  <div class="verse-card" id="theCard">
    <div class="card-inner">
      <div class="card-top-line"></div>
      <div class="card-site">✦ ELYMAS DIGITAL HUB ✦</div>
      <div class="card-cross">✝</div>
      <div class="card-label">✦ &nbsp; Daily Scripture &nbsp; ✦</div>
      <div class="card-divider"></div>
      <div class="card-verse" id="cVerse"></div>
      <div class="card-ref" id="cRef"></div>
      <div class="card-trans-title" id="cTransTitle"></div>
      <div class="card-lang-grid" id="cLangGrid"></div>
      <div class="card-bottom-line"></div>
      <div class="card-footer">✝ &nbsp; Faith &nbsp;·&nbsp; Purpose &nbsp;·&nbsp; Excellence</div>
    </div>
  </div>
</div>

<!-- SAVE / SHARE -->
<button class="save-btn" id="saveBtn" onclick="saveCard()">⬇ Save Image to Share</button>

<div class="tip" id="tip">
  <strong>✅ Image saved to your device!</strong><br/><br/>
  Open your <strong>Gallery / Photos</strong> app →<br/>
  Find the image → tap <strong>Share</strong> →<br/>
  Choose <strong>WhatsApp</strong> → tap <strong>My Status</strong> 🙏
</div>

<!-- html2canvas library for saving -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
/* ── VERSE DATA ── */
var VV = [
  {
    eng: '"For I know the plans I have for you," declares the Lord, "plans to prosper you and not to harm you, plans to give you hope and a future."',
    ref: '— Jeremiah 29:11',
    heb: 'כִּי אָנֹכִי יָדַעְתִּי אֶת-הַמַּחֲשָׁבֹות אֲשֶׁר אָנֹכִי חֹשֵׁב עֲלֵיכֶם נְאֻם-יְהוָה',
    grk: 'ἐγὼ γὰρ οἶδα τοὺς λογισμούς οὓς λογίζομαι ἐφ᾽ ὑμᾶς, λέγει Κύριος, λογισμοὶ εἰρήνης.',
    ara: 'ܡܛܠ ܕܐܢܐ ܝܕܥ ܐܢܐ ܡܚܫܒܬܐ ܕܡܬܚܫܒ ܐܢܐ ܥܠܝܟܘܢ ܐܡܪ ܡܪܝܐ ܡܚܫܒܬܐ ܕܫܠܡܐ',
    lat: 'Ego enim scio cogitationes quas cogito super vos, ait Dominus, cogitationes pacis.'
  },
  {
    eng: '"I can do all things through Christ who strengthens me."',
    ref: '— Philippians 4:13',
    heb: 'הַכֹּל אֲנִי יָכֹול בְּמָשִׁיחַ הַמְחַזְּקֵנִי',
    grk: 'πάντα ἰσχύω ἐν τῷ ἐνδυναμοῦντί με Χριστῷ.',
    ara: 'ܟܠ ܡܕܡ ܡܨܐ ܐܢܐ ܒܡܫܝܚܐ ܗܘ ܕܡܚܝܠ ܠܝ',
    lat: 'Omnia possum in eo qui me confortat.'
  },
  {
    eng: '"The Lord is my shepherd; I shall not want."',
    ref: '— Psalm 23:1',
    heb: 'יְהוָה רֹעִי לֹא אֶחְסָר',
    grk: 'Κύριος ποιμαίνει με, καὶ οὐδέν με ὑστερήσει.',
    ara: 'ܡܪܝܐ ܪܥܐ ܠܝ ܘܡܕܡ ܠܐ ܡܚܣܪ ܠܝ',
    lat: 'Dominus regit me, et nihil mihi deerit.'
  },
  {
    eng: '"Trust in the Lord with all your heart and lean not on your own understanding."',
    ref: '— Proverbs 3:5',
    heb: 'בְּטַח אֶל-יְהוָה בְּכָל-לִבֶּךָ וְאֶל-בִּינָתְךָ אַל-תִּשָּׁעֵן',
    grk: 'πεποιθὼς ἴσθι ἐν ὅλῃ καρδίᾳ σου ἐπὶ τῷ Θεῷ.',
    ara: 'ܬܟܠ ܥܠ ܡܪܝܐ ܒܟܠܗ ܠܒܟ ܘܥܠ ܒܝܢܬܟ ܠܐ ܬܣܬܡܟ',
    lat: 'Habe fiduciam in Domino ex toto corde tuo.'
  },
  {
    eng: '"Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go."',
    ref: '— Joshua 1:9',
    heb: 'חֲזַק וֶאֱמָץ אַל-תַּעֲרֹץ וְאַל-תֵּחָת כִּי עִמְּךָ יְהוָה אֱלֹהֶיךָ',
    grk: 'ἰσχύε καὶ ἀνδρίζου, μὴ δειλιάσῃς μηδὲ φοβηθῇς.',
    ara: 'ܐܬܚܝܠ ܘܐܬܐܡܨ ܠܐ ܬܕܚܠ ܘܠܐ ܬܬܬܒܪ ܡܛܠ ܕܥܡܟ ܡܪܝܐ',
    lat: 'Confortare et esto robustus; noli metuere et noli timere.'
  },
  {
    eng: '"For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life."',
    ref: '— John 3:16',
    heb: 'כִּי-כֵן אָהַב אֱלֹהִים אֶת-הָעוֹלָם עַד כִּי נָתַן אֶת-בְּנוֹ אֶת-יְחִידוֹ',
    grk: 'οὕτω γὰρ ἠγάπησεν ὁ Θεὸς τὸν κόσμον, ὥστε τὸν υἱὸν αὐτοῦ τὸν μονογενῆ ἔδωκεν.',
    ara: 'ܗܟܢܐ ܓܝܪ ܐܚܒ ܐܠܗܐ ܠܥܠܡܐ ܐܝܟܢܐ ܕܠܒܪܗ ܝܚܝܕܝܐ ܢܬܠ',
    lat: 'Sic enim dilexit Deus mundum ut Filium suum unigenitum daret.'
  },
  {
    eng: '"The Lord is my light and my salvation — whom shall I fear?"',
    ref: '— Psalm 27:1',
    heb: 'יְהוָה אוֹרִי וְיִשְׁעִי מִמִּי אִירָא',
    grk: 'Κύριος φωτισμός μου καὶ σωτήρ μου, τίνα φοβηθήσομαι;',
    ara: 'ܡܪܝܐ ܢܘܗܪܝ ܘܦܪܘܩܝ ܡܢ ܕܚܠ',
    lat: 'Dominus illuminatio mea et salus mea, quem timebo?'
  }
];

/* ── TOGGLE LANGUAGE CHECKBOXES ── */
['heb','grk','ara','lat'].forEach(function(l){
  var lb = document.getElementById('lb-'+l);
  lb.addEventListener('click', function(){
    var ck = document.getElementById('ck-'+l);
    ck.checked = !ck.checked;
    lb.classList.toggle('on', ck.checked);
  });
});

/* ── GENERATE CARD ── */
function generateCard(){
  /* Get verse */
  var sel = document.getElementById('verseSelect').value;
  var v = (sel === 'auto')
    ? VV[new Date().getDay() % VV.length]
    : VV[parseInt(sel)];

  /* Fill English */
  document.getElementById('cVerse').textContent = v.eng;
  document.getElementById('cRef').textContent   = v.ref;

  /* Build language grid */
  var langs = [];
  if(document.getElementById('ck-heb').checked) langs.push({name:'Hebrew (עברית)',   text:v.heb, cls:'rtl'});
  if(document.getElementById('ck-grk').checked) langs.push({name:'Greek (Ἑλληνικά)', text:v.grk, cls:''});
  if(document.getElementById('ck-ara').checked) langs.push({name:'Aramaic (ܐܪܡܝܐ)',  text:v.ara, cls:'rtl'});
  if(document.getElementById('ck-lat').checked) langs.push({name:'Latin (Vulgata)',   text:v.lat, cls:'it'});

  var grid = document.getElementById('cLangGrid');
  var title = document.getElementById('cTransTitle');

  if(langs.length > 0){
    title.textContent = '✦   This Verse in Ancient Languages   ✦';
    grid.className = 'card-lang-grid' + (langs.length === 1 ? ' one-col' : '');
    grid.innerHTML = '';
    langs.forEach(function(l){
      var div = document.createElement('div');
      div.className = 'card-lang';
      div.innerHTML =
        '<div class="card-lang-name">'+l.name+'</div>'+
        '<div class="card-lang-text '+l.cls+'">'+l.text+'</div>';
      grid.appendChild(div);
    });
  } else {
    title.textContent = '';
    grid.innerHTML = '';
  }

  /* Show card */
  document.getElementById('card-wrap').classList.add('show');
  document.getElementById('saveBtn').classList.add('show');
  document.getElementById('tip').classList.remove('show');

  /* Scroll to card */
  document.getElementById('card-wrap').scrollIntoView({behavior:'smooth', block:'start'});
}

/* ── SAVE CARD AS IMAGE ── */
function saveCard(){
  var btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ Saving…';
  btn.disabled = true;

  html2canvas(document.getElementById('theCard'), {
    scale: 3,
    useCORS: true,
    backgroundColor: null,
    logging: false
  }).then(function(canvas){
    var link = document.createElement('a');
    var today = new Date();
    var d = today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();
    link.download = 'ElymasVerse-'+d+'.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

    btn.textContent = '⬇ Save Image to Share';
    btn.disabled = false;

    setTimeout(function(){
      document.getElementById('tip').classList.add('show');
      document.getElementById('tip').scrollIntoView({behavior:'smooth'});
    }, 600);
  }).catch(function(err){
    console.error(err);
    btn.textContent = '⬇ Save Image to Share';
    btn.disabled = false;
    alert('Could not save. Please take a screenshot of the card instead.');
  });
}
</script>
</body>
</html>
